# 🏗️ Next.js Security Rules
# Focus: SSR vulnerabilities, API route security, and hydration errors.

rules:
  - id: avoid-server-log-leak
    pattern: "console\\.log\\((.*?)(process\\.env)(.*?)\\)"
    message: "Potential environment variable leak in SSR/API route"
    severity: high
    filePattern: "(pages/api/.*|app/api/.*|getServerSideProps|getStaticProps)"
    suggestion: "Avoid logging the entire process.env object. Log specific keys instead."

  - id: dangerous-set-inner-html
    pattern: "dangerouslySetInnerHTML"
    message: "Dangerous use of dangerouslySetInnerHTML detected"
    severity: high
    suggestion: "Ensure source data is sanitized or use a safer alternative like DOMPurify."

  - id: api-route-missing-auth
    pattern: "export\\s+default\\s+(async\\s+)?function\\s+(handler|GET|POST|PUT|DELETE)"
    message: "API Route defined without explicit authentication check"
    severity: medium
    filePattern: "(pages/api/.*|app/api/.*)"
    suggestion: "Add a JWT or session validation check at the entry point of your API route."

  - id: suppress-hydration-warning
    pattern: "suppressHydrationWarning"
    message: "Hydration warning suppressed"
    severity: info
    suggestion: "Check if the hydration mismatch can be resolved through proper SSR/Client separation before suppressing."
