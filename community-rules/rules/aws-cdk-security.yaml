# ☁️ AWS CDK Security Rules
# Focus: S3 public access, IAM permission least privilege, and VPC isolation.

rules:
  - id: s3-public-access-detected
    pattern: "publicReadAccess:\\s*true"
    message: "Public S3 access enabled"
    severity: high
    filePattern: "\\.(ts|js)$"
    suggestion: "Ensure this S3 bucket is intended to be public. If not, set publicReadAccess to false."

  - id: iam-full-access-wildcard
    pattern: "resources:\\s*\\[['\"]\\*['\"]\\]"
    message: "IAM Policy with wildcard resource access"
    severity: high
    filePattern: "\\.(ts|js)$"
    suggestion: "Define specific ARNs instead of '*' to follow least-privilege principles."

  - id: vpc-unrestricted-egress
    pattern: "allowAllOutbound:\\s*true"
    message: "VPC Security Group with unrestricted egress"
    severity: medium
    filePattern: "\\.(ts|js)$"
    suggestion: "Restrict outbound traffic to only required services."

  - id: s3-encryption-missing
    pattern: "Bucket\\((.*)\\s*([^e](.*)encryption)"
    message: "S3 Bucket without explicit encryption configuration"
    severity: medium
    filePattern: "\\.(ts|js)$"
    suggestion: "Set encryption to BucketEncryption.S3_MANAGED or BucketEncryption.KMS."
