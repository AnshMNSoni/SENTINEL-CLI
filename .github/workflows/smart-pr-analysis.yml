name: Smart PR Analysis

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run analysis
        run: |
          echo "Analyzing PR..."

      - name: Post comment
        if: always()
        run: |
          echo "Analysis complete"
