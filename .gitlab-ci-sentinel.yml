# Sentinel GitLab CI Template
# 
# Add to your .gitlab-ci.yml:
#   include:
#     - template: Sentinel/Security.gitlab-ci.yml
#
# Or use this directly in your pipeline

sentinel:
  image: node:18-alpine
  variables:
    SENTINEL_ANALYZERS: "security,quality,bugs,dependency"
    SENTINEL_FORMAT: "gl-sarif"
    SENTINEL_FAIL_ON: "high"
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  script:
    - npm install -g sentinel-cli
    - sentinel analyze --format gl-sarif --output sentinel-results.sarif
  artifacts:
    when: always
    reports:
      codequality: sentinel-results.sarif
      sast: sentinel-results.sarif
    paths:
      - sentinel-results.sarif

sentinel-fast:
  image: node:18-alpine
  variables:
    SENTINEL_FAST: "true"
  script:
    - npm install -g sentinel-cli
    - sentinel fast
  allow_failure: true

sentinel-container:
  image: node:18-alpine
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - npm install -g sentinel-cli
    - sentinel analyze --analyzers container-security,dockerfile
  allow_failure: true
