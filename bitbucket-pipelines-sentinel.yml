# Sentinel Bitbucket Pipeline Template
# 
# Add to your bitbucket-pipelines.yml:
#   - step:
#       name: Sentinel Security Scan
#       script:
#         - pipe: sentinel/sentinel-pipe:latest
#           variables:
#             SENTINEL_ANALYZERS: "security,quality,bugs"
#             SENTINEL_FAIL_ON: "high"
#             SENTINEL_FORMAT: "bitbucket"

image: node:18

pipelines:
  default:
    - step:
        name: Sentinel Security Scan
        script:
          - npm install -g sentinel-cli
          - sentinel analyze --format bitbucket
        artifacts:
          - sentinel-results.json

  pull-requests:
    - step:
        name: Sentinel PR Review
        script:
          - npm install -g sentinel-cli
          - sentinel analyze --format bitbucket --output $BITBUCKET_PR_DIFF_PATH
        condition:
          changesets:
            includes:
              - "src/**"
              - "lib/**"

  branches:
    main:
      - step:
          name: Sentinel Full Scan
          script:
            - npm install -g sentinel-cli
            - sentinel full-scan --format bitbucket
            - pipe: atlassian/slack-notify:2.0.1
              variables:
                WEBHOOK_URL: $SLACK_WEBHOOK
